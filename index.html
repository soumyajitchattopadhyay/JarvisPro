<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TESrACT // HUD_OVERRIDE</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Michroma&family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Michroma', sans-serif; }
        #canvas-container { position: fixed; inset: 0; z-index: 1; }
        #hud { position: relative; z-index: 10; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 40px; box-sizing: border-box; }
        
        /* STARK ALERT HUD */
        #system-alert { position: fixed; inset: 0; z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(255, 0, 0, 0.1); border: 20px solid rgba(255, 0, 0, 0.4); animation: alert-pulse 0.5s infinite alternate; }
        .alert-text { font-family: 'Syncopate'; color: #ff0000; font-size: 3rem; text-shadow: 0 0 20px #ff0000; letter-spacing: 15px; }
        
        #title-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 0;
            gap: 22px;
        }
        #title-main {
            font-family: 'Syncopate';
            font-size: clamp(2.2rem, 5vw, 4rem);
            color: #fff;
            letter-spacing: clamp(12px, 3vw, 30px);
            text-align: center;
            text-shadow: 0 0 15px #00fbff;
            transition: 0.5s;
            margin: 0;
            flex-shrink: 0;
        }

        /* ── CHAT PANEL ── */
        .chat-panel {
            pointer-events: auto;
            width: min(720px, 92vw);
            max-height: min(52vh, 460px);
            display: flex;
            flex-direction: column;
            border-radius: 16px;
            overflow: hidden;
            background: linear-gradient(145deg, rgba(4, 12, 18, 0.72) 0%, rgba(0, 0, 0, 0.58) 100%);
            border: 1px solid rgba(0, 251, 255, 0.14);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.45),
                0 0 0 1px rgba(0, 251, 255, 0.04) inset,
                0 0 40px rgba(0, 251, 255, 0.04);
            backdrop-filter: blur(14px) saturate(1.4);
            -webkit-backdrop-filter: blur(14px) saturate(1.4);
            position: relative;
        }
        .chat-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 16px; right: 16px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 251, 255, 0.45), transparent);
            pointer-events: none;
        }
        .chat-panel__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px;
            border-bottom: 1px solid rgba(0, 251, 255, 0.08);
            background: rgba(0, 251, 255, 0.03);
            font-family: 'Orbitron';
            font-size: 9px;
            letter-spacing: 3px;
            color: rgba(0, 251, 255, 0.65);
            flex-shrink: 0;
        }
        .chat-panel__title {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chat-status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #00fbff;
            box-shadow: 0 0 8px #00fbff;
            animation: status-pulse 2s ease-in-out infinite;
        }
        .chat-count-badge {
            padding: 3px 10px;
            border-radius: 20px;
            background: rgba(0, 251, 255, 0.08);
            border: 1px solid rgba(0, 251, 255, 0.15);
            font-size: 8px;
            letter-spacing: 2px;
            color: rgba(0, 251, 255, 0.55);
        }
        .chat-messages-wrap {
            position: relative;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }
        .chat-messages-wrap::before,
        .chat-messages-wrap::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 20px;
            z-index: 2;
            pointer-events: none;
        }
        .chat-messages-wrap::before {
            top: 0;
            background: linear-gradient(to bottom, rgba(4, 12, 18, 0.9), transparent);
        }
        .chat-messages-wrap::after {
            bottom: 0;
            background: linear-gradient(to top, rgba(4, 12, 18, 0.9), transparent);
        }
        .chat-messages {
            overflow-y: auto;
            padding: 16px 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
            height: 100%;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(0, 251, 255, 0.2);
            border-radius: 4px;
        }
        .chat-messages::-webkit-scrollbar-thumb:hover { background: rgba(0, 251, 255, 0.35); }

        .chat-msg {
            position: relative;
            display: flex;
            gap: 12px;
            max-width: 94%;
            animation: chat-in 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .chat-msg--user {
            align-self: flex-end;
            flex-direction: row-reverse;
            max-width: 78%;
        }
        .chat-msg--assistant { align-self: flex-start; max-width: 96%; }
        .chat-msg--loading .chat-msg__bubble {
            border-color: rgba(0, 251, 255, 0.22);
            box-shadow: 0 0 24px rgba(0, 251, 255, 0.06);
            animation: bubble-pulse 2s ease-in-out infinite;
        }
        .chat-msg__avatar {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            border: 1px solid rgba(0, 251, 255, 0.2);
            background: rgba(0, 251, 255, 0.06);
            color: rgba(0, 251, 255, 0.8);
        }
        .chat-msg--user .chat-msg__avatar {
            background: rgba(0, 251, 255, 0.12);
            border-color: rgba(0, 251, 255, 0.35);
            color: #e8feff;
        }
        .chat-msg__bubble {
            position: relative;
            flex: 1;
            min-width: 0;
            padding: 14px 40px 14px 16px;
            border-radius: 16px;
            border: 1px solid rgba(0, 251, 255, 0.1);
            background: rgba(0, 10, 16, 0.82);
        }
        .chat-msg--user .chat-msg__bubble {
            border-color: rgba(0, 251, 255, 0.22);
            background: linear-gradient(135deg, rgba(0, 251, 255, 0.1) 0%, rgba(0, 251, 255, 0.04) 100%);
            border-radius: 16px 16px 4px 16px;
            padding: 12px 16px;
        }
        .chat-msg--assistant .chat-msg__bubble {
            border-radius: 16px 16px 16px 4px;
            background: linear-gradient(160deg, rgba(2, 14, 22, 0.9) 0%, rgba(0, 8, 14, 0.85) 100%);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
        }
        .chat-msg__label {
            font-family: 'Orbitron';
            font-size: 7px;
            letter-spacing: 2.5px;
            color: rgba(0, 251, 255, 0.45);
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .chat-msg--user .chat-msg__label { color: rgba(0, 251, 255, 0.7); margin-bottom: 4px; }
        .chat-msg__body img.chat-gen-img,
        .md-content img {
            max-width: 100%;
            border-radius: 4px;
            border: 1px solid #00ffff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
            margin-top: 10px;
            display: block;
            background: rgba(0, 20, 30, 0.6);
        }
        .chat-msg__body {
            color: rgba(210, 248, 255, 0.94);
            font-size: 13px;
            line-height: 1.7;
            word-break: break-word;
            user-select: text;
        }
        .chat-msg--user .chat-msg__body {
            color: #e8feff;
            white-space: pre-wrap;
            font-size: 12.5px;
            line-height: 1.55;
        }

        /* ── MARKDOWN CONTENT ── */
        .md-content > *:first-child { margin-top: 0; }
        .md-content > *:last-child { margin-bottom: 0; }
        .md-content p { margin: 0 0 0.85em; }
        .md-content p:last-child { margin-bottom: 0; }
        .md-content h1, .md-content h2, .md-content h3,
        .md-content h4, .md-content h5, .md-content h6 {
            font-family: 'Orbitron', sans-serif;
            color: #e8feff;
            letter-spacing: 1.5px;
            margin: 1.25em 0 0.55em;
            line-height: 1.35;
            font-weight: 400;
        }
        .md-content h1 { font-size: 1.15em; color: #00fbff; }
        .md-content h2 { font-size: 1.05em; }
        .md-content h3 { font-size: 0.95em; color: rgba(0, 251, 255, 0.85); }
        .md-content h4, .md-content h5, .md-content h6 { font-size: 0.88em; }
        .md-content strong, .md-content b {
            color: #fff;
            font-weight: 600;
        }
        .md-content em, .md-content i { color: rgba(0, 251, 255, 0.8); }
        .md-content ul, .md-content ol {
            margin: 0.5em 0 0.9em;
            padding-left: 1.4em;
        }
        .md-content li {
            margin: 0.35em 0;
            padding-left: 0.25em;
        }
        .md-content li::marker { color: rgba(0, 251, 255, 0.55); }
        .md-content ul ul, .md-content ol ol, .md-content ul ol, .md-content ol ul {
            margin: 0.25em 0;
        }
        .md-content blockquote {
            margin: 0.85em 0;
            padding: 10px 14px;
            border-left: 3px solid rgba(0, 251, 255, 0.45);
            background: rgba(0, 251, 255, 0.04);
            border-radius: 0 8px 8px 0;
            color: rgba(180, 235, 245, 0.88);
        }
        .md-content blockquote p { margin-bottom: 0.4em; }
        .md-content hr {
            border: none;
            height: 1px;
            margin: 1.1em 0;
            background: linear-gradient(90deg, transparent, rgba(0, 251, 255, 0.25), transparent);
        }
        .md-content a {
            color: #00fbff;
            text-decoration: none;
            border-bottom: 1px solid rgba(0, 251, 255, 0.3);
            transition: border-color 0.2s, color 0.2s;
        }
        .md-content a:hover {
            color: #7fffff;
            border-bottom-color: rgba(0, 251, 255, 0.6);
        }
        .md-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 0.85em 0;
            font-size: 0.92em;
        }
        .md-content th, .md-content td {
            padding: 8px 12px;
            border: 1px solid rgba(0, 251, 255, 0.12);
            text-align: left;
        }
        .md-content th {
            background: rgba(0, 251, 255, 0.08);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.78em;
            letter-spacing: 1px;
            color: rgba(0, 251, 255, 0.75);
        }
        .md-content tr:nth-child(even) td { background: rgba(0, 251, 255, 0.02); }
        .md-content :not(pre) > code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.88em;
            padding: 2px 7px;
            border-radius: 5px;
            background: rgba(0, 251, 255, 0.08);
            border: 1px solid rgba(0, 251, 255, 0.15);
            color: #7ee8ff;
        }

        /* ── CODE BLOCKS ── */
        .code-block {
            margin: 0.9em 0;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(0, 251, 255, 0.14);
            background: #0a0e14;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
        }
        .code-block__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 7px 12px;
            background: linear-gradient(180deg, rgba(0, 251, 255, 0.07) 0%, rgba(0, 20, 30, 0.5) 100%);
            border-bottom: 1px solid rgba(0, 251, 255, 0.1);
        }
        .code-block__lang {
            font-family: 'Orbitron', sans-serif;
            font-size: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(0, 251, 255, 0.55);
        }
        .code-block__copy {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(0, 251, 255, 0.18);
            background: rgba(0, 0, 0, 0.35);
            color: rgba(0, 251, 255, 0.5);
            font-family: 'Orbitron', sans-serif;
            font-size: 7px;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .code-block__copy:hover {
            color: #00fbff;
            border-color: rgba(0, 251, 255, 0.45);
            background: rgba(0, 251, 255, 0.08);
        }
        .code-block__copy.copied {
            color: #00ff88;
            border-color: rgba(0, 255, 136, 0.5);
        }
        .code-block pre {
            margin: 0 !important;
            padding: 14px 16px !important;
            background: transparent !important;
            border-radius: 0 !important;
            overflow-x: auto;
            font-size: 12px !important;
            line-height: 1.55 !important;
        }
        .code-block pre code {
            font-family: 'JetBrains Mono', monospace !important;
            background: transparent !important;
            border: none !important;
            padding: 0 !important;
            color: #c8e6f0 !important;
            text-shadow: none !important;
        }
        .code-block pre::-webkit-scrollbar { height: 5px; }
        .code-block pre::-webkit-scrollbar-thumb {
            background: rgba(0, 251, 255, 0.2);
            border-radius: 4px;
        }
        .md-content > pre:not(.code-block pre) {
            margin: 0.9em 0;
            padding: 14px 16px;
            border-radius: 10px;
            background: #0a0e14;
            border: 1px solid rgba(0, 251, 255, 0.14);
            overflow-x: auto;
        }

        /* Prism cyberpunk overrides */
        .code-block .token.comment, .code-block .token.prolog, .code-block .token.doctype, .code-block .token.cdata { color: #5a7a88; }
        .code-block .token.punctuation { color: #6a9aaa; }
        .code-block .token.property, .code-block .token.tag, .code-block .token.boolean, .code-block .token.number, .code-block .token.constant, .code-block .token.symbol { color: #ff79c6; }
        .code-block .token.selector, .code-block .token.attr-name, .code-block .token.string, .code-block .token.char, .code-block .token.builtin { color: #7ee8a0; }
        .code-block .token.operator, .code-block .token.entity, .code-block .token.url { color: #00fbff; }
        .code-block .token.atrule, .code-block .token.attr-value, .code-block .token.keyword { color: #00d4ff; }
        .code-block .token.function, .code-block .token.class-name { color: #ffd866; }
        .code-block .token.regex, .code-block .token.important, .code-block .token.variable { color: #ff9f43; }

        .chat-copy {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 251, 255, 0.15);
            border-radius: 7px;
            color: rgba(0, 251, 255, 0.4);
            width: 26px;
            height: 26px;
            cursor: pointer;
            font-size: 9px;
            transition: all 0.2s ease;
            opacity: 0;
        }
        .chat-msg__bubble:hover .chat-copy { opacity: 1; }
        .chat-copy:hover {
            color: #00fbff;
            border-color: rgba(0, 251, 255, 0.5);
            background: rgba(0, 251, 255, 0.08);
            box-shadow: 0 0 12px rgba(0, 251, 255, 0.15);
        }
        .chat-copy.copied { color: #00ff88; border-color: #00ff88; opacity: 1; }

        /* ── LOADING STATE ── */
        .chat-typing {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .chat-typing__row {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(0, 251, 255, 0.65);
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            letter-spacing: 2.5px;
        }
        .chat-typing-dots {
            display: flex;
            gap: 5px;
        }
        .chat-typing-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #00fbff;
            box-shadow: 0 0 6px rgba(0, 251, 255, 0.5);
            animation: typing-bounce 1.2s ease-in-out infinite;
        }
        .chat-typing-dots span:nth-child(2) { animation-delay: 0.15s; }
        .chat-typing-dots span:nth-child(3) { animation-delay: 0.3s; }
        .chat-typing__bar {
            height: 2px;
            border-radius: 2px;
            background: rgba(0, 251, 255, 0.1);
            overflow: hidden;
            position: relative;
        }
        .chat-typing__bar::after {
            content: '';
            position: absolute;
            top: 0; left: -40%;
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #00fbff, transparent);
            animation: scan-line 1.8s ease-in-out infinite;
        }

        @keyframes chat-in {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes status-pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 8px #00fbff; }
            50% { opacity: 0.5; box-shadow: 0 0 4px #00fbff; }
        }
        @keyframes typing-bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }
        @keyframes bubble-pulse {
            0%, 100% { box-shadow: 0 0 16px rgba(0, 251, 255, 0.05); }
            50% { box-shadow: 0 0 28px rgba(0, 251, 255, 0.12); }
        }
        @keyframes scan-line {
            0% { left: -40%; }
            100% { left: 100%; }
        }

        /* ── INPUT BAR ── */
        .input-wrapper {
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-shrink: 0;
            width: min(720px, 92vw);
            margin-left: auto;
            margin-right: auto;
        }
        .input-bar {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 5px 5px 22px;
            border-radius: 50px;
            background: linear-gradient(145deg, rgba(4, 12, 18, 0.85) 0%, rgba(0, 0, 0, 0.75) 100%);
            border: 1px solid rgba(0, 251, 255, 0.18);
            box-shadow:
                0 4px 24px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(0, 251, 255, 0.04) inset,
                inset 0 1px 0 rgba(0, 251, 255, 0.06);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            transition: border-color 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
        }
        .input-bar:focus-within {
            border-color: rgba(0, 251, 255, 0.4);
            box-shadow:
                0 4px 28px rgba(0, 0, 0, 0.4),
                0 0 24px rgba(0, 251, 255, 0.1),
                inset 0 1px 0 rgba(0, 251, 255, 0.1);
        }
        .input-bar.is-busy {
            opacity: 0.65;
            pointer-events: none;
        }
        #user-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e8feff;
            padding: 13px 0;
            font-family: 'Michroma', sans-serif;
            font-size: 12.5px;
            outline: none;
            letter-spacing: 0.5px;
        }
        #user-input::placeholder {
            color: rgba(0, 251, 255, 0.32);
            letter-spacing: 1.5px;
            font-size: 11px;
        }
        #user-input:disabled { cursor: not-allowed; }
        .input-hint {
            font-family: 'Orbitron', sans-serif;
            font-size: 7px;
            letter-spacing: 1.5px;
            color: rgba(0, 251, 255, 0.25);
            padding-right: 4px;
            white-space: nowrap;
            user-select: none;
        }
        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(0, 251, 255, 0.28);
            background: linear-gradient(145deg, rgba(0, 251, 255, 0.12) 0%, rgba(0, 251, 255, 0.05) 100%);
            color: rgba(0, 251, 255, 0.75);
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .send-btn:hover:not(:disabled) {
            background: rgba(0, 251, 255, 0.22);
            color: #00fbff;
            border-color: rgba(0, 251, 255, 0.55);
            box-shadow: 0 0 18px rgba(0, 251, 255, 0.25);
            transform: translateY(-1px);
        }
        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .mic-btn {
            background: linear-gradient(145deg, rgba(4, 12, 18, 0.8) 0%, rgba(0, 0, 0, 0.7) 100%);
            border: 1px solid rgba(0, 251, 255, 0.25);
            color: rgba(0, 251, 255, 0.75);
            width: 54px;
            height: 54px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            backdrop-filter: blur(8px);
            flex-shrink: 0;
        }
        .mic-btn:hover {
            border-color: rgba(0, 251, 255, 0.5);
            color: #00fbff;
            box-shadow: 0 0 20px rgba(0, 251, 255, 0.15);
        }
        .mic-btn.active {
            border-color: #ff0055;
            color: #ff0055;
            background: rgba(255, 0, 85, 0.1);
            box-shadow: 0 0 28px rgba(255, 0, 85, 0.35);
            animation: mic-pulse 1.5s ease-in-out infinite;
        }
        @keyframes mic-pulse {
            0%, 100% { box-shadow: 0 0 28px rgba(255, 0, 85, 0.35); }
            50% { box-shadow: 0 0 40px rgba(255, 0, 85, 0.55); }
        }
        @keyframes alert-pulse { from { opacity: 0.4; } to { opacity: 1; } }

        #confirm-banner {
            display: none;
            pointer-events: auto;
            width: min(720px, 92vw);
            margin: 0 auto 10px;
            padding: 12px 16px;
            border-radius: 12px;
            background: rgba(255, 120, 0, 0.12);
            border: 1px solid rgba(255, 160, 0, 0.45);
            color: #ffb347;

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>

    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }</script>
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        let isThinking = false, isListening = false, lerpFactor = 0, currentCtrl = false, ctrlToggleBusy = false;
        const chatMessages = document.getElementById('chat-messages');
        const chatCountEl = document.getElementById('chat-count');
        const sysAlert = document.getElementById('system-alert');
        const confirmBanner = document.getElementById('confirm-banner');
        const confirmBannerText = document.getElementById('confirm-banner-text');
        const confirmBannerCmd = document.getElementById('confirm-banner-cmd');
        const ctrlSwitch = document.getElementById('ctrl-switch');
        const ctrlToggleWrap = document.getElementById('ctrl-toggle-wrap');
        const ctrlToggleHint = document.getElementById('ctrl-toggle-hint');
        const chatCtrlMini = document.getElementById('chat-ctrl-mini');

        function setControlUi(allowed, { announce = false, reply = '' } = {}) {
            currentCtrl = !!allowed;
            const modeEl = document.getElementById('ctrl-mode');
            if (modeEl) {
                modeEl.innerText = currentCtrl ? 'ELEVATED' : 'RESTRICTED';
                modeEl.style.color = currentCtrl ? '#ff0000' : '#00fbff';
            }
            if (ctrlSwitch) {
                ctrlSwitch.classList.toggle('is-on', currentCtrl);
                ctrlSwitch.setAttribute('aria-checked', currentCtrl ? 'true' : 'false');
            }
            if (ctrlToggleWrap) {
                ctrlToggleWrap.classList.toggle('is-elevated', currentCtrl);
            }
            if (ctrlToggleHint) {
                ctrlToggleHint.textContent = currentCtrl
                    ? 'Elevated — filesystem & terminal unlocked'
                    : 'Restricted — filesystem locked';
            }
            if (chatCtrlMini) {
                chatCtrlMini.textContent = currentCtrl ? 'CTRL ON' : 'CTRL OFF';
                chatCtrlMini.classList.toggle('is-elevated', currentCtrl);
            }
            if (announce && reply) {
                appendChatMessage('assistant', reply);
            }
        }

        async function fetchControlStatus() {
            try {
                const res = await fetch('/permission');
                if (res.ok) {
                    const data = await res.json();
                    setControlUi(!!data.control_status);
                    return;
                }
                // Older servers without /permission: leave UI as-is
            } catch (e) {
                console.warn('Permission status fetch failed', e);
            }
        }

        async function postPermissionToggle(enabled) {
            // Primary: dedicated permission API (no LLM)
            let res = await fetch('/permission', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ control_allowed: !!enabled }),
            });

            // Fallback: chat short-circuit ("Allow Control" / "Stop Control")
            // Used when the server process is stale and does not expose /permission yet.
            if (res.status === 404 || res.status === 405) {
                res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: enabled ? 'Allow Control' : 'Stop Control',
                    }),
                });
            }

            let data = {};
            try {
                data = await res.json();
            } catch (_) {
                data = {};
            }
            if (!res.ok) {
                const detail = data.error || data.detail || `HTTP ${res.status}`;
                throw new Error(detail);
            }
            return data;
        }

        async function setControlFromToggle(enabled) {
            if (ctrlToggleBusy) return;
            ctrlToggleBusy = true;
            if (ctrlSwitch) ctrlSwitch.disabled = true;
            // Optimistic UI so the switch feels responsive
            setControlUi(!!enabled);
            try {
                const data = await postPermissionToggle(enabled);
                const allowed = typeof data.control_status === 'boolean'
                    ? data.control_status
                    : !!enabled;
                setControlUi(allowed, {
                    announce: true,
                    reply: data.reply || (allowed
                        ? 'Elevated Mac control granted for this session, Sir.'
                        : 'Mac control revoked, Sir.'),
                });
                updateConfirmBanner(data.pending_command || null);
            } catch (e) {
                console.warn('Permission toggle failed', e);
                // Revert UI to last known server state
                await fetchControlStatus();
                const msg = (e && e.message) ? String(e.message) : 'unknown error';
                appendChatMessage(
                    'assistant',
                    `Could not update Mac control, Sir (${msg}). `
                    + 'If the server was started before the toggle was added, restart it with: python main.py web'
                );
            } finally {
                ctrlToggleBusy = false;
                if (ctrlSwitch) ctrlSwitch.disabled = false;
            }
        }

        if (ctrlSwitch) {
            ctrlSwitch.addEventListener('click', () => {
                setControlFromToggle(!currentCtrl);
            });
        }
        // Load persisted session permission on boot
        fetchControlStatus();

        function updateConfirmBanner(pending) {
            if (!pending || !pending.command) {
                confirmBanner.style.display = 'none';
                return;
            }
            confirmBannerText.textContent = 'Reply "Confirm command" or "Yes, run it" to execute:';
            confirmBannerCmd.textContent = pending.command;
            confirmBanner.style.display = 'block';
        }
        const inputBar = document.getElementById('input-bar');
        const userInputEl = document.getElementById('user-input');
        const sendBtnEl = document.getElementById('send-btn');
        let loadingMsgEl = null;

        const LANG_LABELS = {
            bash: 'BASH', sh: 'SHELL', shell: 'SHELL', zsh: 'ZSH',
            python: 'PYTHON', py: 'PYTHON', javascript: 'JAVASCRIPT', js: 'JAVASCRIPT',
            typescript: 'TYPESCRIPT', ts: 'TYPESCRIPT', json: 'JSON', yaml: 'YAML', yml: 'YAML',
            html: 'HTML', css: 'CSS', sql: 'SQL', java: 'JAVA', rust: 'RUST', go: 'GO',
            cpp: 'C++', c: 'C', plaintext: 'TEXT', text: 'TEXT', console: 'CONSOLE'
        };

        if (window.marked) {
            marked.use({ gfm: true, breaks: true });
        }

        function updateChatCount() {
            const n = chatMessages.querySelectorAll('.chat-msg:not(.chat-msg--loading)').length;
            chatCountEl.textContent = `${n} MSG`;
        }

        function scrollChatToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function setInputBusy(busy) {
            userInputEl.disabled = busy;
            sendBtnEl.disabled = busy;
            inputBar.classList.toggle('is-busy', busy);
        }

        async function copyToClipboard(text, btn, iconOnly = true) {
            try {
                await navigator.clipboard.writeText(text);
            } catch (_) {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            }
            const prev = btn.innerHTML;
            btn.classList.add('copied');
            btn.innerHTML = iconOnly
                ? '<i class="fa-solid fa-check"></i>'
                : '<i class="fa-solid fa-check"></i> COPIED';
            setTimeout(() => {
                btn.classList.remove('copied');
                btn.innerHTML = prev;
            }, 1600);
        }

        function detectLanguage(codeEl) {
            const cls = [...codeEl.classList].find((c) => c.startsWith('language-'));
            if (cls) return cls.slice(9).toLowerCase();
            const sample = (codeEl.textContent || '').trim().slice(0, 200);
            if (/^(\$ |#!\/bin\/(ba)?sh|sudo |npm |pip |curl |git )/m.test(sample)) return 'bash';
            if (/^(def |import |from |print\(|class )/m.test(sample)) return 'python';
            if (/^(\{|\[|")/.test(sample) && /":/.test(sample)) return 'json';
            return 'plaintext';
        }

        function enhanceCodeBlocks(root) {
            root.querySelectorAll('pre').forEach((pre) => {
                if (pre.closest('.code-block')) return;
                let codeEl = pre.querySelector('code');
                if (!codeEl) {
                    codeEl = document.createElement('code');
                    codeEl.textContent = pre.textContent;
                    pre.textContent = '';
                    pre.appendChild(codeEl);
                }
                const lang = detectLanguage(codeEl);
                if (![...codeEl.classList].some((c) => c.startsWith('language-'))) {
                    codeEl.classList.add(`language-${lang}`);
                }

                const wrapper = document.createElement('div');
                wrapper.className = 'code-block';
                const header = document.createElement('div');
                header.className = 'code-block__header';
                const langLabel = document.createElement('span');
                langLabel.className = 'code-block__lang';
                langLabel.textContent = LANG_LABELS[lang] || lang.toUpperCase();
                const copyBtn = document.createElement('button');
                copyBtn.type = 'button';
                copyBtn.className = 'code-block__copy';
                copyBtn.title = 'Copy code';
                copyBtn.innerHTML = '<i class="fa-solid fa-copy"></i> COPY';
                copyBtn.onclick = () => copyToClipboard(codeEl.textContent, copyBtn, false);
                header.append(langLabel, copyBtn);
                pre.parentNode.insertBefore(wrapper, pre);
                wrapper.append(header, pre);
                if (window.Prism) Prism.highlightElement(codeEl);
            });
        }

        function renderMarkdown(text) {
            if (!window.marked) return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
            return marked.parse(text);
        }

        /**
         * Ensure free Pollinations assets surface as markdown images the HUD can render.
         * Handles: ![alt](/generated/…) and bare /generated/img_….png paths.
         */
        function normalizeGeneratedImageMarkdown(text) {
            let t = String(text || '');
            // Bare path → markdown image (skip if already inside markdown/link parens)
            t = t.replace(
                /(^|[\s\n>])(\/generated\/[A-Za-z0-9._/-]+\.(?:png|jpe?g|webp|gif))(?=$|[\s\n)<\]])/gim,
                (match, pre, path) => {
                    // Already preceded by ](  → leave alone (handled as full markdown)
                    return `${pre}![Generated Image](${path})`;
                }
            );
            // Local URL: /generated/... lines from older tool envelopes
            t = t.replace(
                /^Local URL:\s*(\/generated\/[^\s]+)\s*$/gim,
                '![Generated Image]($1)'
            );
            return t;
        }

        const GEN_IMG_STYLE =
            'max-width: 100%; border-radius: 4px; border: 1px solid #00ffff; '
            + 'box-shadow: 0 0 10px rgba(0, 255, 255, 0.2); margin-top: 10px; display: block;';

        function enhanceGeneratedImages(root) {
            if (!root) return;
            root.querySelectorAll('img').forEach((img) => {
                const src = img.getAttribute('src') || '';
                if (/\/generated\//i.test(src) || img.classList.contains('chat-gen-img')) {
                    img.classList.add('chat-gen-img');
                    img.style.cssText = GEN_IMG_STYLE;
                    img.loading = 'lazy';
                    img.alt = img.alt || 'Generated Image';
                    img.onerror = () => {
                        img.style.opacity = '0.4';
                        img.title = 'Image failed to load — is /generated mounted?';
                    };
                }
            });
            // Raw text fallback: if markdown left a lone path as text, upgrade it
            const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
            const textNodes = [];
            while (walker.nextNode()) textNodes.push(walker.currentNode);
            textNodes.forEach((node) => {
                const val = node.nodeValue || '';
                if (!/\/generated\/[A-Za-z0-9._/-]+\.(?:png|jpe?g|webp|gif)/i.test(val)) return;
                if (node.parentElement && node.parentElement.closest('a, code, pre, img')) return;
                const span = document.createElement('span');
                span.innerHTML = val.replace(
                    /(\/generated\/[A-Za-z0-9._/-]+\.(?:png|jpe?g|webp|gif))/gi,
                    (path) =>
                        `<img class="chat-gen-img" src="${path}" alt="Generated Image" `
                        + `style="${GEN_IMG_STYLE}" loading="lazy" />`
                );
                node.parentNode.replaceChild(span, node);
            });
        }

        function populateMessageBody(body, role, text) {
            if (role === 'assistant') {
                body.classList.add('md-content');
                const normalized = normalizeGeneratedImageMarkdown(text);
                body.innerHTML = renderMarkdown(normalized);
                enhanceCodeBlocks(body);
                enhanceGeneratedImages(body);
            } else {
                body.textContent = text;
            }
        }

        function appendChatMessage(role, text) {
            const msg = document.createElement('div');
            msg.className = `chat-msg chat-msg--${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'chat-msg__avatar';
            avatar.innerHTML = role === 'user'
                ? '<i class="fa-solid fa-user"></i>'
                : '<i class="fa-solid fa-microchip"></i>';

            const bubble = document.createElement('div');
            bubble.className = 'chat-msg__bubble';

            const label = document.createElement('div');
            label.className = 'chat-msg__label';
            label.textContent = role === 'user' ? 'OPERATOR' : 'TESrACT';

            const body = document.createElement('div');
            body.className = 'chat-msg__body';
            populateMessageBody(body, role, text);

            bubble.append(label, body);
            if (role === 'assistant') {
                const copyBtn = document.createElement('button');
                copyBtn.className = 'chat-copy';
                copyBtn.type = 'button';
                copyBtn.title = 'Copy message';
                copyBtn.innerHTML = '<i class="fa-solid fa-copy"></i>';
                copyBtn.onclick = () => copyToClipboard(text, copyBtn);
                bubble.appendChild(copyBtn);
            }
            msg.append(avatar, bubble);
            chatMessages.appendChild(msg);
            updateChatCount();
            scrollChatToBottom();
            return msg;
        }

        function showLoadingMessage() {
            removeLoadingMessage();
            loadingMsgEl = document.createElement('div');
            loadingMsgEl.className = 'chat-msg chat-msg--assistant chat-msg--loading';
            loadingMsgEl.innerHTML = `
                <div class="chat-msg__avatar"><i class="fa-solid fa-microchip"></i></div>
                <div class="chat-msg__bubble">
                    <div class="chat-msg__label">TESrACT</div>
                    <div class="chat-typing">
                        <div class="chat-typing__row">
                            <span>SYNTHESIZING</span>
                            <span class="chat-typing-dots"><span></span><span></span><span></span></span>
                        </div>
                        <div class="chat-typing__bar"></div>
                    </div>
                </div>`;
            chatMessages.appendChild(loadingMsgEl);
            scrollChatToBottom();
        }

        function removeLoadingMessage() {
            if (loadingMsgEl) {
                loadingMsgEl.remove();
                loadingMsgEl = null;
            }
        }

        appendChatMessage('assistant', 'AT YOUR SERVICE');

        async function processCommand(text) {
            const prompt = (text || '').trim();
            if (!prompt) return;

            appendChatMessage('user', prompt);
            isThinking = true;
            setInputBusy(true);
            document.getElementById('agent-status').innerText = "PROCESSING";
            showLoadingMessage();

            try {
                const res = await fetch('/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({text: prompt}) });
                let data = {};
                try {
                    data = await res.json();
                } catch (_) {
                    data = {};
                }
                // Prefer server `reply`; fall back to auth/error detail so 401s are not silent.
                let reply = (data && (data.reply || data.detail || data.error)) || '';
                if (!reply) {
                    reply = res.ok
                        ? 'No response received.'
                        : `Request failed (HTTP ${res.status}). Is the Mac brain online?`;
                }
                removeLoadingMessage();
                appendChatMessage('assistant', reply);

                try {
                    if (window.speechSynthesis && reply) {
                        window.speechSynthesis.cancel();
                        const utter = new SpeechSynthesisUtterance(reply);
                        utter.rate = 1.05;
                        utter.pitch = 1.0;
                        window.speechSynthesis.speak(utter);
                    }
                } catch(_) {}

                const replyLower = reply.toLowerCase();
                if (data.control_status && (replyLower.includes("execution") || replyLower.includes("opened") || replyLower.includes("complete"))) {
                    sysAlert.style.display = 'flex'; setTimeout(() => sysAlert.style.display = 'none', 2800);
                }
                if (typeof data.control_status === 'boolean') {
                    setControlUi(data.control_status);
                }
                updateConfirmBanner(data.pending_command || null);
                if ((reply || '').includes('CONFIRMATION_REQUIRED')) {
                    confirmBanner.style.display = 'block';
                }
            } catch(e) {
                removeLoadingMessage();
                appendChatMessage('assistant', 'TESrACT is having a temporary issue, Sir.');
                console.warn('Chat fetch failed', e);
            }
            isThinking = false;
            setInputBusy(false);
            document.getElementById('agent-status').innerText = "STANDBY";
        }

        // --- HIGH PERFORMANCE THREE.JS ENGINE (Render-safe) ---
        const canvasContainer = document.getElementById('canvas-container');
        let renderer, composer, scene, camera;
        let instancedMeshes = [];
        const nodes = [];
        const COUNT = 140;
        const ICON_POOL = 70;
        const PARTICLE_SIZE = 2.2;
        const CAMERA_Z = 90;
        const CAM_NEAR = 20;
        const CAM_FAR = 300;
        const Z_WRAP = 50;
        const Z_RESET = -175;
        const TUNNEL_SPREAD = 150;
        const CIRCLE_Z = 32;
        const CIRCLE_R = 58;
        const _animPos = new THREE.Vector3();
        const _animTarget = new THREE.Vector3();
        const _animMat = new THREE.Matrix4();
        const _animScale = new THREE.Vector3();
        const _animQuat = new THREE.Quaternion();


        async function initThree() {
            try {
                const allBrands = await fetch('/icons/manifest.json').then((res) => {
                    if (!res.ok) throw new Error(`manifest ${res.status}`);
                    return res.json();
                });
                if (!allBrands.length) throw new Error('manifest empty');
                const brands = allBrands.slice(0, ICON_POOL);
                for (let i = brands.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [brands[i], brands[j]] = [brands[j], brands[i]];
                }
                scene = new THREE.Scene();
                scene.fog = new THREE.FogExp2(0x000000, 0.006);
                camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, CAM_NEAR, CAM_FAR);
                renderer = new THREE.WebGLRenderer({ 
                    antialias: false, 
                    powerPreference: "high-performance",
                    alpha: true 
                });
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1));
                renderer.setSize(window.innerWidth, window.innerHeight);
                canvasContainer.appendChild(renderer.domElement);

                composer = new EffectComposer(renderer);
                composer.addPass(new RenderPass(scene, camera));
                window.__bloomPass = new UnrealBloomPass(
                    new THREE.Vector2(window.innerWidth * 0.5, window.innerHeight * 0.5),
                    0.38, 0.42, 0.9
                );
                composer.addPass(window.__bloomPass);
                composer.addPass(new OutputPass());

                // Local icon textures — rasterize SVG to canvas (TextureLoader + SVG is unreliable in WebGL)
                const ICON_DIR = '/icons/';
                const ICON_SIZE = 64;
                const ICON_LOAD_CONCURRENCY = 12;

                function prepareSvg(svgText) {
                    let svg = svgText
                        .replace(/fill="currentColor"/gi, 'fill="#00fbff"')
                        .replace(/stroke="currentColor"/gi, 'stroke="#00fbff"')
                        .replace(/fill="#[0-9A-Fa-f]{3,8}"/gi, 'fill="#00fbff"');
                    if (!/fill="#00fbff"/i.test(svg.slice(0, 240))) {
                        svg = svg.replace('<svg ', '<svg fill="#00fbff" ');
                    }
                    return svg;
                }

                function canvasHasPixels(ctx, size) {
                    const data = ctx.getImageData(0, 0, size, size).data;
                    for (let i = 3; i < data.length; i += 16) {
                        if (data[i] > 12) return true;
                    }
                    return false;
                }

                function configureIconTexture(tex) {
                    tex.flipY = false;
                    tex.colorSpace = THREE.SRGBColorSpace;
                    tex.minFilter = THREE.LinearFilter;
                    tex.magFilter = THREE.LinearFilter;
                    tex.generateMipmaps = false;
                    return tex;
                }

                function loadSvgTexture(url) {
                    return fetch(url)
                        .then((res) => {
                            if (!res.ok) throw new Error(`${res.status} ${url}`);
                            return res.text();
                        })
                        .then((svgText) => new Promise((resolve, reject) => {
                            const img = new Image();
                            const blobUrl = URL.createObjectURL(
                                new Blob([prepareSvg(svgText)], { type: 'image/svg+xml' })
                            );
                            img.onload = () => {
                                const canvas = document.createElement('canvas');
                                canvas.width = ICON_SIZE;
                                canvas.height = ICON_SIZE;
                                const ctx = canvas.getContext('2d');
                                ctx.clearRect(0, 0, ICON_SIZE, ICON_SIZE);
                                ctx.drawImage(img, 0, 0, ICON_SIZE, ICON_SIZE);
                                URL.revokeObjectURL(blobUrl);
                                if (!canvasHasPixels(ctx, ICON_SIZE)) {
                                    reject(new Error(`empty raster: ${url}`));
                                    return;
                                }
                                resolve(configureIconTexture(new THREE.CanvasTexture(canvas)));
                            };
                            img.onerror = () => {
                                URL.revokeObjectURL(blobUrl);
                                reject(new Error(`SVG rasterize failed: ${url}`));
                            };
                            img.src = blobUrl;
                        }));
                }

                const geometry = new THREE.PlaneGeometry(PARTICLE_SIZE, PARTICLE_SIZE);
                const perMeshCount = Math.ceil(COUNT / brands.length);

                instancedMeshes = brands.map((brand) => {
                    const mat = new THREE.MeshBasicMaterial({
                        color: 0x00fbff,
                        transparent: true,
                        opacity: 0.42,
                        side: THREE.DoubleSide,
                        depthWrite: false
                    });

                    const im = new THREE.InstancedMesh(geometry, mat, perMeshCount);
                    im.frustumCulled = false;
                    scene.add(im);
                    return im;
                });

                // Stagger texture rasterization so 1000 icons don't freeze the tab
                let loadCursor = 0, loadActive = 0;
                function pumpIconLoads() {
                    while (loadActive < ICON_LOAD_CONCURRENCY && loadCursor < brands.length) {
                        const brand = brands[loadCursor++];
                        const im = instancedMeshes[loadCursor - 1];
                        loadActive++;
                        loadSvgTexture(`${ICON_DIR}${brand}.svg`)
                            .then((tex) => {
                                im.material.map = tex;
                                im.material.needsUpdate = true;
                            })
                            .catch((err) => console.warn(`Icon fallback for ${brand}:`, err.message))
                            .finally(() => { loadActive--; pumpIconLoads(); });
                    }
                }
                pumpIconLoads();

                const activeMeshes = Math.min(instancedMeshes.length, COUNT);
                const activePerMesh = Math.ceil(COUNT / activeMeshes);
                instancedMeshes.forEach((im, idx) => { im.count = idx < activeMeshes ? activePerMesh : 0; });

                for (let i = 0; i < COUNT; i++) {
                    nodes.push({
                        tunnelX: (Math.random() - 0.5) * TUNNEL_SPREAD,
                        tunnelY: (Math.random() - 0.5) * TUNNEL_SPREAD,
                        tunnelZ: Z_RESET + Math.random() * (Z_WRAP - Z_RESET),
                        circleAngle: (i / COUNT) * Math.PI * 2 * 3,
                        speed: 0.5 + Math.random() * 1.1,
                        scale: 0.75 + Math.random() * 0.45,
                        meshIndex: i % activeMeshes,
                        instanceIndex: Math.floor(i / activeMeshes)
                    });
                }
                camera.position.z = CAMERA_Z;

                // Handle window resize (critical for deployment)
                function onResize() {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                    if (composer && window.__bloomPass) {
                        window.__bloomPass.resolution.set(window.innerWidth * 0.5, window.innerHeight * 0.5);
                    }
                }
                window.addEventListener('resize', onResize, false);

                return true;
            } catch (err) {
                console.error('Three.js init failed:', err);
                canvasContainer.innerHTML = '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#f55;font-family:monospace;font-size:12px;opacity:0.6;">WEBGL_UNAVAILABLE ΓÇö HUD DEGRADED</div>';
                return false;
            }
        }

        let threeReady = false;
        initThree().then((ok) => { threeReady = ok; });

        function animate() {
            requestAnimationFrame(animate);
            if (!threeReady || !renderer || !composer || !instancedMeshes.length) return;

            lerpFactor = THREE.MathUtils.lerp(lerpFactor, isListening ? 1 : 0, 0.08);

            const r = CIRCLE_R + Math.sin(Date.now() * 0.0015) * 5;
            nodes.forEach(n => {
                n.tunnelZ += n.speed * (isThinking ? 4 : 1);
                if (n.tunnelZ > Z_WRAP) n.tunnelZ = Z_RESET;

                _animPos.set(n.tunnelX, n.tunnelY, n.tunnelZ);
                _animTarget.set(Math.cos(n.circleAngle) * r, Math.sin(n.circleAngle) * r, CIRCLE_Z);
                _animPos.lerp(_animTarget, lerpFactor);

                const im = instancedMeshes[n.meshIndex];
                if (!im || n.instanceIndex >= im.count) return;
                _animScale.set(n.scale, n.scale, n.scale);
                _animMat.compose(_animPos, _animQuat, _animScale);
                im.setMatrixAt(n.instanceIndex, _animMat);
            });

            instancedMeshes.forEach(im => { im.instanceMatrix.needsUpdate = true; });
            composer.render();
        }
        animate();

        // Dedicated reliable clock updater (independent of Three.js loop)
        function updateClock() {
            const clockEl = document.getElementById('clock');
            if (clockEl) {
                const now = new Date();
                clockEl.innerText = now.toLocaleTimeString([], { 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit' 
                });
            }
        }
        updateClock();
        setInterval(updateClock, 1000);

        function submitInput() {
            if (isThinking) return;
            const val = userInputEl.value;
            if (!val.trim()) return;
            processCommand(val);
            userInputEl.value = '';
        }
        userInputEl.onkeypress = (e) => { if (e.key === 'Enter') submitInput(); };
        sendBtnEl.onclick = submitInput;
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Speech) {
            const rec = new Speech(), micBtn = document.getElementById('mic-btn');
            micBtn.onclick = () => { isListening = true; rec.start(); micBtn.classList.add('active'); };
            rec.onresult = (e) => processCommand(e.results[0][0].transcript);
            rec.onend = () => { isListening = false; micBtn.classList.remove('active'); };
        }
    </script>
</body>
</html>
