<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TESrACT // HUD_OVERRIDE</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Michroma&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Michroma', sans-serif; }
        #canvas-container { position: fixed; inset: 0; z-index: 1; cursor: crosshair; }
        #hud { position: relative; z-index: 10; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 40px; box-sizing: border-box; }
        
        /* STARK ALERT HUD */
        #system-alert { position: fixed; inset: 0; z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(255, 0, 0, 0.1); border: 20px solid rgba(255, 0, 0, 0.4); animation: alert-pulse 0.5s infinite alternate; }
        .alert-text { font-family: 'Syncopate'; color: #ff0000; font-size: 3rem; text-shadow: 0 0 20px #ff0000; letter-spacing: 15px; }
        
        #title-main { font-family: 'Syncopate'; font-size: 4rem; color: #fff; letter-spacing: 30px; text-align: center; text-shadow: 0 0 15px #00fbff; transition: 0.5s; }
        .input-wrapper { pointer-events: auto; display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; }
        #user-input { background: rgba(0, 0, 0, 0.9); border: 1px solid rgba(0, 251, 255, 0.2); color: #00fbff; padding: 18px; width: 500px; font-family: 'Michroma'; outline: none; text-align: center; }
        .mic-btn { background: none; border: 1px solid #00fbff; color: #00fbff; width: 60px; height: 60px; border-radius: 50%; cursor: pointer; }
        .mic-btn.active { border-color: #ff0055; color: #ff0055; box-shadow: 0 0 30px #ff0055; }
        @keyframes alert-pulse { from { opacity: 0.4; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="system-alert"><div class="alert-text">TESrACT OVERRIDE</div></div>
    <div id="canvas-container"></div>
    <div id="hud">
        <div style="display:flex; justify-content: space-between;">
            <div class="ui-text" style="color:#00fbff; font-family:'Orbitron'; font-size:9px; letter-spacing:3px;">TESrACT: <span id="agent-status">STANDBY</span><br>CTRL: <span id="ctrl-mode">RESTRICTED</span></div>
            <div class="ui-text" id="clock" style="color:#00fbff; font-family:'Orbitron';">00:00:00</div>
        </div>
        <div id="title-container"><h1 id="title-main">TESrACT</h1><div id="chat-output" style="color: #00fbff; text-align:center; font-size:12px; margin-top:10px;">AT YOUR SERVICE</div></div>
        <div class="input-wrapper"><input type="text" id="user-input" placeholder="COMMAND..." autocomplete="off"><button id="mic-btn" class="mic-btn"><i class="fa-solid fa-microphone"></i></button></div>
    </div>

    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }</script>
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        let isThinking = false, isListening = false, lerpFactor = 0, currentCtrl = false;
        const chatOutput = document.getElementById('chat-output'), sysAlert = document.getElementById('system-alert');

        async function processCommand(text) {
            isThinking = true; document.getElementById('agent-status').innerText = "PROCESSING";
            try {
                const res = await fetch('/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({text}) });
                const data = await res.json();
                chatOutput.innerText = data.reply;

                // Browser TTS for web deployment (no server audio needed)
                try {
                    if (window.speechSynthesis && data.reply) {
                        window.speechSynthesis.cancel();
                        const utter = new SpeechSynthesisUtterance(data.reply);
                        utter.rate = 1.05;
                        utter.pitch = 1.0;
                        window.speechSynthesis.speak(utter);
                    }
                } catch(_) {}

                // TESrACT EXECUTION ALERT (for privileged actions)
                const replyLower = (data.reply || "").toLowerCase();
                if (data.control_status && (replyLower.includes("execution") || replyLower.includes("opened") || replyLower.includes("complete"))) {
                    sysAlert.style.display = 'flex'; setTimeout(() => sysAlert.style.display = 'none', 2800);
                }
                if (data.control_status !== currentCtrl) {
                    currentCtrl = data.control_status;
                    document.getElementById('ctrl-mode').innerText = currentCtrl ? "ELEVATED" : "RESTRICTED";
                    document.getElementById('ctrl-mode').style.color = currentCtrl ? "#ff0000" : "#00fbff";
                }
            } catch(e) { 
                chatOutput.innerText = "TESrACT is having a temporary issue, Sir."; 
                console.warn('Chat fetch failed', e);
            }
            isThinking = false; document.getElementById('agent-status').innerText = "STANDBY";
        }

        // --- PREMIUM THREE.JS BACKGROUND ---
        const canvasContainer = document.getElementById('canvas-container');
        let renderer, composer, scene, camera;
        let particlePoints, particleData = [];
        let floatingIcons = [];

        const PARTICLE_COUNT = 900;
        const GLOW_CYAN = new THREE.Color(0x00fbff);
        const GLOW_GREEN = new THREE.Color(0x00ffaa);
        const mouse = new THREE.Vector2(-9, -9);
        const mouseWorld = new THREE.Vector3();
        const raycaster = new THREE.Raycaster();
        const dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
        let shapePulse = 0;
        let shapeCenter = new THREE.Vector3();
        let shapeRing = 0;
        const clock = new THREE.Clock();

        const ICON_DEFS = [
            { slug: 'google',     x: -280, y: 160, z: -420, scale: 22, drift: 0.3 },
            { slug: 'javascript', x:  320, y:  90, z: -380, scale: 20, drift: 0.45 },
            { slug: 'intel',      x: -180, y: -140, z: -460, scale: 24, drift: 0.35 },
            { slug: 'apple',      x:  240, y: -200, z: -500, scale: 22, drift: 0.28 },
            { slug: 'x',          x:  -60, y:  220, z: -350, scale: 18, drift: 0.5 },
            { slug: 'python',     x:  420, y: -60, z: -440, scale: 20, drift: 0.38 },
            { slug: 'react',      x: -380, y:  -30, z: -400, scale: 19, drift: 0.42 },
            { slug: 'nvidia',     x:   80, y: -260, z: -480, scale: 21, drift: 0.33 }
        ];

        function applyTextureSettings(tex) {
            tex.minFilter = THREE.LinearFilter;
            tex.magFilter = THREE.LinearFilter;
            tex.generateMipmaps = false;
            tex.colorSpace = THREE.SRGBColorSpace;
        }

        function createGlowTexture(label) {
            const size = 128;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, size, size);
            ctx.fillStyle = '#00fbff';
            ctx.font = 'bold 64px Michroma, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(label, size / 2, size / 2);
            const tex = new THREE.CanvasTexture(canvas);
            applyTextureSettings(tex);
            return tex;
        }

        function spawnFieldSpread() {
            const spreadX = Math.max(window.innerWidth * 0.55, 500);
            const spreadY = Math.max(window.innerHeight * 0.55, 400);
            return {
                x: (Math.random() - 0.5) * spreadX * 2,
                y: (Math.random() - 0.5) * spreadY * 2,
                z: (Math.random() - 0.5) * 500
            };
        }

        function initParticles() {
            const positions = new Float32Array(PARTICLE_COUNT * 3);
            const colors = new Float32Array(PARTICLE_COUNT * 3);
            particleData = [];

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const spread = spawnFieldSpread();
                const tint = Math.random() > 0.45 ? GLOW_CYAN : GLOW_GREEN;
                const i3 = i * 3;

                positions[i3] = spread.x;
                positions[i3 + 1] = spread.y;
                positions[i3 + 2] = spread.z;

                colors[i3] = tint.r;
                colors[i3 + 1] = tint.g;
                colors[i3 + 2] = tint.b;

                particleData.push({
                    x: spread.x, y: spread.y, z: spread.z,
                    vx: 0, vy: 0, vz: 0,
                    homeX: spread.x, homeY: spread.y, homeZ: spread.z,
                    phase: Math.random() * Math.PI * 2,
                    ringAngle: (i / PARTICLE_COUNT) * Math.PI * 2,
                    speed: 0.25 + Math.random() * 0.55
                });
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const mat = new THREE.PointsMaterial({
                size: 2.2,
                vertexColors: true,
                transparent: true,
                opacity: 0.75,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                sizeAttenuation: true
            });

            particlePoints = new THREE.Points(geo, mat);
            scene.add(particlePoints);
        }

        function initFloatingIcons(loader) {
            const geo = new THREE.PlaneGeometry(1, 1);
            ICON_DEFS.forEach((def) => {
                const fallback = createGlowTexture(def.slug[0].toUpperCase());
                const mat = new THREE.MeshBasicMaterial({
                    map: fallback,
                    color: 0x00fbff,
                    transparent: true,
                    opacity: 0.14,
                    alphaTest: 0.05,
                    depthWrite: false,
                    blending: THREE.AdditiveBlending,
                    side: THREE.DoubleSide
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(def.x, def.y, def.z);
                mesh.scale.setScalar(def.scale);
                mesh.userData = { def, baseOpacity: 0.14 };
                scene.add(mesh);
                floatingIcons.push(mesh);

                loader.load(
                    `https://cdn.simpleicons.org/${def.slug}/00fbff`,
                    (tex) => {
                        applyTextureSettings(tex);
                        if (mat.map !== fallback) mat.map.dispose();
                        else fallback.dispose();
                        mat.map = tex;
                        mat.needsUpdate = true;
                    }
                );
            });
        }

        function updateMouseNDC(clientX, clientY) {
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            raycaster.ray.intersectPlane(dragPlane, mouseWorld);
        }

        function triggerShapePulse(x, y) {
            updateMouseNDC(x, y);
            shapeCenter.copy(mouseWorld);
            shapeRing = 90 + Math.random() * 40;
            shapePulse = 1;
        }

        function initThree() {
            try {
                scene = new THREE.Scene();
                scene.fog = new THREE.FogExp2(0x000000, 0.00085);
                camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 3000);
                camera.position.z = 520;

                renderer = new THREE.WebGLRenderer({
                    antialias: false,
                    powerPreference: 'high-performance',
                    alpha: false
                });
                renderer.setClearColor(0x000000, 1);
                const pixelRatio = Math.min(window.devicePixelRatio, 1.25);
                renderer.setPixelRatio(pixelRatio);
                renderer.setSize(window.innerWidth, window.innerHeight);
                canvasContainer.appendChild(renderer.domElement);

                composer = new EffectComposer(renderer);
                composer.setPixelRatio(pixelRatio);
                composer.addPass(new RenderPass(scene, camera));
                window.__bloomPass = new UnrealBloomPass(
                    new THREE.Vector2(window.innerWidth, window.innerHeight),
                    0.55, 0.38, 0.15
                );
                composer.addPass(window.__bloomPass);
                composer.addPass(new OutputPass());

                initParticles();

                const loader = new THREE.TextureLoader();
                loader.setCrossOrigin('anonymous');
                initFloatingIcons(loader);

                window.addEventListener('mousemove', (e) => updateMouseNDC(e.clientX, e.clientY), { passive: true });
                window.addEventListener('mousedown', (e) => {
                    if (e.target.closest('.input-wrapper, #mic-btn, #user-input')) return;
                    triggerShapePulse(e.clientX, e.clientY);
                });

                function onResize() {
                    const ratio = Math.min(window.devicePixelRatio, 1.25);
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setPixelRatio(ratio);
                    renderer.setSize(window.innerWidth, window.innerHeight);
                    composer.setPixelRatio(ratio);
                    composer.setSize(window.innerWidth, window.innerHeight);
                    if (window.__bloomPass) {
                        window.__bloomPass.resolution.set(window.innerWidth, window.innerHeight);
                    }
                }
                window.addEventListener('resize', onResize, false);

                return true;
            } catch (err) {
                console.error('Three.js init failed:', err);
                canvasContainer.innerHTML = '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#f55;font-family:monospace;font-size:12px;opacity:0.6;">WEBGL_UNAVAILABLE — HUD DEGRADED</div>';
                return false;
            }
        }

        const threeReady = initThree();

        function animate() {
            requestAnimationFrame(animate);
            if (!threeReady || !renderer || !composer || !particlePoints) return;

            const t = clock.getElapsedTime();
            const dt = Math.min(clock.getDelta(), 0.033);
            lerpFactor = THREE.MathUtils.lerp(lerpFactor, isListening ? 1 : 0, 0.06);
            shapePulse = THREE.MathUtils.lerp(shapePulse, 0, 0.035);

            const positions = particlePoints.geometry.attributes.position.array;
            const listenRing = 130 + Math.sin(t * 1.2) * 8;
            const flowSpeed = isThinking ? 2.2 : 1;
            const repelRadius = 140;
            const repelStrength = 1.8;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const p = particleData[i];
                const i3 = i * 3;

                // Gentle ambient drift
                let tx = p.homeX + Math.sin(t * p.speed * flowSpeed + p.phase) * 28;
                let ty = p.homeY + Math.cos(t * p.speed * 0.9 * flowSpeed + p.phase * 1.3) * 22;
                let tz = p.homeZ + Math.sin(t * 0.35 + p.phase) * 18;

                // Mouse repulsion
                if (mouse.x > -2) {
                    const dx = p.x - mouseWorld.x;
                    const dy = p.y - mouseWorld.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < repelRadius && dist > 0.001) {
                        const force = (1 - dist / repelRadius) * repelStrength;
                        tx += (dx / dist) * force * 55;
                        ty += (dy / dist) * force * 55;
                    }
                }

                // Click pulse — particles briefly form a ring
                if (shapePulse > 0.02) {
                    const ringX = shapeCenter.x + Math.cos(p.ringAngle) * shapeRing;
                    const ringY = shapeCenter.y + Math.sin(p.ringAngle) * shapeRing;
                    const blend = shapePulse * shapePulse;
                    tx = THREE.MathUtils.lerp(tx, ringX, blend * 0.85);
                    ty = THREE.MathUtils.lerp(ty, ringY, blend * 0.85);
                }

                // Listening mode — elegant orbital gather
                if (lerpFactor > 0.01) {
                    const orbitX = Math.cos(p.ringAngle) * listenRing;
                    const orbitY = Math.sin(p.ringAngle) * listenRing;
                    tx = THREE.MathUtils.lerp(tx, orbitX, lerpFactor * 0.7);
                    ty = THREE.MathUtils.lerp(ty, orbitY, lerpFactor * 0.7);
                    tz = THREE.MathUtils.lerp(tz, 40, lerpFactor * 0.5);
                }

                // Smooth physics
                p.vx += (tx - p.x) * 2.8 * dt;
                p.vy += (ty - p.y) * 2.8 * dt;
                p.vz += (tz - p.z) * 2.8 * dt;
                p.vx *= 0.88; p.vy *= 0.88; p.vz *= 0.88;
                p.x += p.vx; p.y += p.vy; p.z += p.vz;

                positions[i3] = p.x;
                positions[i3 + 1] = p.y;
                positions[i3 + 2] = p.z;
            }
            particlePoints.geometry.attributes.position.needsUpdate = true;

            // Subtle floating icons
            floatingIcons.forEach((mesh) => {
                const { def } = mesh.userData;
                mesh.position.x = def.x + Math.sin(t * def.drift + def.x) * 12;
                mesh.position.y = def.y + Math.cos(t * def.drift * 0.8 + def.y) * 10;
                mesh.position.z = def.z + Math.sin(t * 0.2 + def.z) * 15;
                mesh.rotation.z = Math.sin(t * 0.15 + def.drift) * 0.08;
                mesh.material.opacity = def.baseOpacity + Math.sin(t * 0.6 + def.drift) * 0.04;
                mesh.lookAt(camera.position);
            });

            composer.render();
        }
        animate();

        // Dedicated reliable clock updater (independent of Three.js loop)
        function updateClock() {
            const clockEl = document.getElementById('clock');
            if (clockEl) {
                const now = new Date();
                clockEl.innerText = now.toLocaleTimeString([], { 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit' 
                });
            }
        }
        updateClock();
        setInterval(updateClock, 1000);

        document.getElementById('user-input').onkeypress = (e) => { if(e.key === 'Enter') { processCommand(e.target.value); e.target.value = ''; } };
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Speech) {
            const rec = new Speech(), micBtn = document.getElementById('mic-btn');
            micBtn.onclick = () => { isListening = true; rec.start(); micBtn.classList.add('active'); };
            rec.onresult = (e) => processCommand(e.results[0][0].transcript);
            rec.onend = () => { isListening = false; micBtn.classList.remove('active'); };
        }
    </script>
</body>
</html>
