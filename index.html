<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TESrACT // HUD_OVERRIDE</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Michroma&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Michroma', sans-serif; }
        #canvas-container { position: fixed; inset: 0; z-index: 1; }
        #hud { position: relative; z-index: 10; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 40px; box-sizing: border-box; }
        
        /* STARK ALERT HUD */
        #system-alert { position: fixed; inset: 0; z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(255, 0, 0, 0.1); border: 20px solid rgba(255, 0, 0, 0.4); animation: alert-pulse 0.5s infinite alternate; }
        .alert-text { font-family: 'Syncopate'; color: #ff0000; font-size: 3rem; text-shadow: 0 0 20px #ff0000; letter-spacing: 15px; }
        
        #title-main { font-family: 'Syncopate'; font-size: 4rem; color: #fff; letter-spacing: 30px; text-align: center; text-shadow: 0 0 15px #00fbff; transition: 0.5s; }
        .input-wrapper { pointer-events: auto; display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; }
        #user-input { background: rgba(0, 0, 0, 0.9); border: 1px solid rgba(0, 251, 255, 0.2); color: #00fbff; padding: 18px; width: 500px; font-family: 'Michroma'; outline: none; text-align: center; }
        .mic-btn { background: none; border: 1px solid #00fbff; color: #00fbff; width: 60px; height: 60px; border-radius: 50%; cursor: pointer; }
        .mic-btn.active { border-color: #ff0055; color: #ff0055; box-shadow: 0 0 30px #ff0055; }
        @keyframes alert-pulse { from { opacity: 0.4; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="system-alert"><div class="alert-text">TESrACT OVERRIDE</div></div>
    <div id="canvas-container"></div>
    <div id="hud">
        <div style="display:flex; justify-content: space-between;">
            <div class="ui-text" style="color:#00fbff; font-family:'Orbitron'; font-size:9px; letter-spacing:3px;">TESrACT: <span id="agent-status">STANDBY</span><br>CTRL: <span id="ctrl-mode">RESTRICTED</span></div>
            <div class="ui-text" id="clock" style="color:#00fbff; font-family:'Orbitron';">00:00:00</div>
        </div>
        <div id="title-container"><h1 id="title-main">TESrACT</h1><div id="chat-output" style="color: #00fbff; text-align:center; font-size:12px; margin-top:10px;">AT YOUR SERVICE</div></div>
        <div class="input-wrapper"><input type="text" id="user-input" placeholder="COMMAND..." autocomplete="off"><button id="mic-btn" class="mic-btn"><i class="fa-solid fa-microphone"></i></button></div>
    </div>

    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }</script>
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        let isThinking = false, isListening = false, lerpFactor = 0, currentCtrl = false;
        const chatOutput = document.getElementById('chat-output'), sysAlert = document.getElementById('system-alert');

        async function processCommand(text) {
            isThinking = true; document.getElementById('agent-status').innerText = "PROCESSING";
            try {
                const res = await fetch('/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({text}) });
                const data = await res.json();
                chatOutput.innerText = data.reply;

                // Browser TTS for web deployment (no server audio needed)
                try {
                    if (window.speechSynthesis && data.reply) {
                        window.speechSynthesis.cancel();
                        const utter = new SpeechSynthesisUtterance(data.reply);
                        utter.rate = 1.05;
                        utter.pitch = 1.0;
                        window.speechSynthesis.speak(utter);
                    }
                } catch(_) {}

                // TESrACT EXECUTION ALERT (for privileged actions)
                const replyLower = (data.reply || "").toLowerCase();
                if (data.control_status && (replyLower.includes("execution") || replyLower.includes("opened") || replyLower.includes("complete"))) {
                    sysAlert.style.display = 'flex'; setTimeout(() => sysAlert.style.display = 'none', 2800);
                }
                if (data.control_status !== currentCtrl) {
                    currentCtrl = data.control_status;
                    document.getElementById('ctrl-mode').innerText = currentCtrl ? "ELEVATED" : "RESTRICTED";
                    document.getElementById('ctrl-mode').style.color = currentCtrl ? "#ff0000" : "#00fbff";
                }
            } catch(e) { 
                chatOutput.innerText = "TESrACT is having a temporary issue, Sir."; 
                console.warn('Chat fetch failed', e);
            }
            isThinking = false; document.getElementById('agent-status').innerText = "STANDBY";
        }

        // --- HIGH PERFORMANCE THREE.JS ENGINE (Render-safe) ---
        const canvasContainer = document.getElementById('canvas-container');
        let renderer, composer, scene, camera;
        let instancedMeshes = [];
        const nodes = [];
        const COUNT = 140;
        const ICON_POOL = 70;
        const PARTICLE_SIZE = 2.2;
        const CAMERA_Z = 90;
        const CAM_NEAR = 20;
        const CAM_FAR = 300;
        const Z_WRAP = 50;
        const Z_RESET = -175;
        const TUNNEL_SPREAD = 150;
        const CIRCLE_Z = 32;
        const CIRCLE_R = 58;
        const _animPos = new THREE.Vector3();
        const _animTarget = new THREE.Vector3();
        const _animMat = new THREE.Matrix4();
        const _animScale = new THREE.Vector3();
        const _animQuat = new THREE.Quaternion();


        async function initThree() {
            try {
                const allBrands = await fetch('/icons/manifest.json').then((res) => {
                    if (!res.ok) throw new Error(`manifest ${res.status}`);
                    return res.json();
                });
                if (!allBrands.length) throw new Error('manifest empty');
                const brands = allBrands.slice(0, ICON_POOL);
                for (let i = brands.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [brands[i], brands[j]] = [brands[j], brands[i]];
                }
                scene = new THREE.Scene();
                scene.fog = new THREE.FogExp2(0x000000, 0.006);
                camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, CAM_NEAR, CAM_FAR);
                renderer = new THREE.WebGLRenderer({ 
                    antialias: false, 
                    powerPreference: "high-performance",
                    alpha: true 
                });
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1));
                renderer.setSize(window.innerWidth, window.innerHeight);
                canvasContainer.appendChild(renderer.domElement);

                composer = new EffectComposer(renderer);
                composer.addPass(new RenderPass(scene, camera));
                window.__bloomPass = new UnrealBloomPass(
                    new THREE.Vector2(window.innerWidth * 0.5, window.innerHeight * 0.5),
                    0.38, 0.42, 0.9
                );
                composer.addPass(window.__bloomPass);
                composer.addPass(new OutputPass());

                // Local icon textures — rasterize SVG to canvas (TextureLoader + SVG is unreliable in WebGL)
                const ICON_DIR = '/icons/';
                const ICON_SIZE = 64;
                const ICON_LOAD_CONCURRENCY = 12;

                function prepareSvg(svgText) {
                    let svg = svgText
                        .replace(/fill="currentColor"/gi, 'fill="#00fbff"')
                        .replace(/stroke="currentColor"/gi, 'stroke="#00fbff"')
                        .replace(/fill="#[0-9A-Fa-f]{3,8}"/gi, 'fill="#00fbff"');
                    if (!/fill="#00fbff"/i.test(svg.slice(0, 240))) {
                        svg = svg.replace('<svg ', '<svg fill="#00fbff" ');
                    }
                    return svg;
                }

                function canvasHasPixels(ctx, size) {
                    const data = ctx.getImageData(0, 0, size, size).data;
                    for (let i = 3; i < data.length; i += 16) {
                        if (data[i] > 12) return true;
                    }
                    return false;
                }

                function configureIconTexture(tex) {
                    tex.flipY = false;
                    tex.colorSpace = THREE.SRGBColorSpace;
                    tex.minFilter = THREE.LinearFilter;
                    tex.magFilter = THREE.LinearFilter;
                    tex.generateMipmaps = false;
                    return tex;
                }

                function loadSvgTexture(url) {
                    return fetch(url)
                        .then((res) => {
                            if (!res.ok) throw new Error(`${res.status} ${url}`);
                            return res.text();
                        })
                        .then((svgText) => new Promise((resolve, reject) => {
                            const img = new Image();
                            const blobUrl = URL.createObjectURL(
                                new Blob([prepareSvg(svgText)], { type: 'image/svg+xml' })
                            );
                            img.onload = () => {
                                const canvas = document.createElement('canvas');
                                canvas.width = ICON_SIZE;
                                canvas.height = ICON_SIZE;
                                const ctx = canvas.getContext('2d');
                                ctx.clearRect(0, 0, ICON_SIZE, ICON_SIZE);
                                ctx.drawImage(img, 0, 0, ICON_SIZE, ICON_SIZE);
                                URL.revokeObjectURL(blobUrl);
                                if (!canvasHasPixels(ctx, ICON_SIZE)) {
                                    reject(new Error(`empty raster: ${url}`));
                                    return;
                                }
                                resolve(configureIconTexture(new THREE.CanvasTexture(canvas)));
                            };
                            img.onerror = () => {
                                URL.revokeObjectURL(blobUrl);
                                reject(new Error(`SVG rasterize failed: ${url}`));
                            };
                            img.src = blobUrl;
                        }));
                }

                const geometry = new THREE.PlaneGeometry(PARTICLE_SIZE, PARTICLE_SIZE);
                const perMeshCount = Math.ceil(COUNT / brands.length);

                instancedMeshes = brands.map((brand) => {
                    const mat = new THREE.MeshBasicMaterial({
                        color: 0x00fbff,
                        transparent: true,
                        opacity: 0.42,
                        side: THREE.DoubleSide,
                        depthWrite: false
                    });

                    const im = new THREE.InstancedMesh(geometry, mat, perMeshCount);
                    im.frustumCulled = false;
                    scene.add(im);
                    return im;
                });

                // Stagger texture rasterization so 1000 icons don't freeze the tab
                let loadCursor = 0, loadActive = 0;
                function pumpIconLoads() {
                    while (loadActive < ICON_LOAD_CONCURRENCY && loadCursor < brands.length) {
                        const brand = brands[loadCursor++];
                        const im = instancedMeshes[loadCursor - 1];
                        loadActive++;
                        loadSvgTexture(`${ICON_DIR}${brand}.svg`)
                            .then((tex) => {
                                im.material.map = tex;
                                im.material.needsUpdate = true;
                            })
                            .catch((err) => console.warn(`Icon fallback for ${brand}:`, err.message))
                            .finally(() => { loadActive--; pumpIconLoads(); });
                    }
                }
                pumpIconLoads();

                const activeMeshes = Math.min(instancedMeshes.length, COUNT);
                const activePerMesh = Math.ceil(COUNT / activeMeshes);
                instancedMeshes.forEach((im, idx) => { im.count = idx < activeMeshes ? activePerMesh : 0; });

                for (let i = 0; i < COUNT; i++) {
                    nodes.push({
                        tunnelX: (Math.random() - 0.5) * TUNNEL_SPREAD,
                        tunnelY: (Math.random() - 0.5) * TUNNEL_SPREAD,
                        tunnelZ: Z_RESET + Math.random() * (Z_WRAP - Z_RESET),
                        circleAngle: (i / COUNT) * Math.PI * 2 * 3,
                        speed: 0.5 + Math.random() * 1.1,
                        scale: 0.75 + Math.random() * 0.45,
                        meshIndex: i % activeMeshes,
                        instanceIndex: Math.floor(i / activeMeshes)
                    });
                }
                camera.position.z = CAMERA_Z;

                // Handle window resize (critical for deployment)
                function onResize() {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                    if (composer && window.__bloomPass) {
                        window.__bloomPass.resolution.set(window.innerWidth * 0.5, window.innerHeight * 0.5);
                    }
                }
                window.addEventListener('resize', onResize, false);

                return true;
            } catch (err) {
                console.error('Three.js init failed:', err);
                canvasContainer.innerHTML = '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#f55;font-family:monospace;font-size:12px;opacity:0.6;">WEBGL_UNAVAILABLE ΓÇö HUD DEGRADED</div>';
                return false;
            }
        }

        let threeReady = false;
        initThree().then((ok) => { threeReady = ok; });

        function animate() {
            requestAnimationFrame(animate);
            if (!threeReady || !renderer || !composer || !instancedMeshes.length) return;

            lerpFactor = THREE.MathUtils.lerp(lerpFactor, isListening ? 1 : 0, 0.08);

            const r = CIRCLE_R + Math.sin(Date.now() * 0.0015) * 5;
            nodes.forEach(n => {
                n.tunnelZ += n.speed * (isThinking ? 4 : 1);
                if (n.tunnelZ > Z_WRAP) n.tunnelZ = Z_RESET;

                _animPos.set(n.tunnelX, n.tunnelY, n.tunnelZ);
                _animTarget.set(Math.cos(n.circleAngle) * r, Math.sin(n.circleAngle) * r, CIRCLE_Z);
                _animPos.lerp(_animTarget, lerpFactor);

                const im = instancedMeshes[n.meshIndex];
                if (!im || n.instanceIndex >= im.count) return;
                _animScale.set(n.scale, n.scale, n.scale);
                _animMat.compose(_animPos, _animQuat, _animScale);
                im.setMatrixAt(n.instanceIndex, _animMat);
            });

            instancedMeshes.forEach(im => { im.instanceMatrix.needsUpdate = true; });
            composer.render();
        }
        animate();

        // Dedicated reliable clock updater (independent of Three.js loop)
        function updateClock() {
            const clockEl = document.getElementById('clock');
            if (clockEl) {
                const now = new Date();
                clockEl.innerText = now.toLocaleTimeString([], { 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit' 
                });
            }
        }
        updateClock();
        setInterval(updateClock, 1000);

        document.getElementById('user-input').onkeypress = (e) => { if(e.key === 'Enter') { processCommand(e.target.value); e.target.value = ''; } };
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Speech) {
            const rec = new Speech(), micBtn = document.getElementById('mic-btn');
            micBtn.onclick = () => { isListening = true; rec.start(); micBtn.classList.add('active'); };
            rec.onresult = (e) => processCommand(e.results[0][0].transcript);
            rec.onend = () => { isListening = false; micBtn.classList.remove('active'); };
        }
    </script>
</body>
</html>
