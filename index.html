<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TESrACT // HUD_OVERRIDE</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Michroma&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Michroma', sans-serif; }
        #canvas-container { position: fixed; inset: 0; z-index: 1; }
        #hud { position: relative; z-index: 10; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 40px; box-sizing: border-box; }
        
        /* STARK ALERT HUD */
        #system-alert { position: fixed; inset: 0; z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(255, 0, 0, 0.1); border: 20px solid rgba(255, 0, 0, 0.4); animation: alert-pulse 0.5s infinite alternate; }
        .alert-text { font-family: 'Syncopate'; color: #ff0000; font-size: 3rem; text-shadow: 0 0 20px #ff0000; letter-spacing: 15px; }
        
        #title-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 0; gap: 14px; }
        #title-main { font-family: 'Syncopate'; font-size: 4rem; color: #fff; letter-spacing: 30px; text-align: center; text-shadow: 0 0 15px #00fbff; transition: 0.5s; margin: 0; flex-shrink: 0; }

        .chat-panel {
            pointer-events: auto;
            width: min(720px, 92vw);
            max-height: min(38vh, 340px);
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(0, 251, 255, 0.18);
            box-shadow: 0 0 24px rgba(0, 251, 255, 0.06);
            backdrop-filter: blur(6px);
        }
        .chat-panel__header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 14px; border-bottom: 1px solid rgba(0, 251, 255, 0.12);
            font-family: 'Orbitron'; font-size: 8px; letter-spacing: 3px; color: rgba(0, 251, 255, 0.7);
        }
        .chat-messages {
            overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px;
            scroll-behavior: smooth;
        }
        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(0, 251, 255, 0.25); border-radius: 3px; }

        .chat-msg {
            position: relative; max-width: 88%; padding: 10px 38px 10px 12px;
            border: 1px solid rgba(0, 251, 255, 0.14);
            background: rgba(0, 8, 12, 0.82);
            animation: chat-in 0.25s ease;
        }
        .chat-msg--user {
            align-self: flex-end;
            border-color: rgba(0, 251, 255, 0.32);
            background: rgba(0, 251, 255, 0.06);
        }
        .chat-msg--assistant { align-self: flex-start; }
        .chat-msg--loading { opacity: 0.75; }
        .chat-msg__label {
            font-family: 'Orbitron'; font-size: 7px; letter-spacing: 2px;
            color: rgba(0, 251, 255, 0.55); margin-bottom: 6px; text-transform: uppercase;
        }
        .chat-msg--user .chat-msg__label { color: rgba(0, 251, 255, 0.85); }
        .chat-msg__body {
            color: #00fbff; font-size: 12px; line-height: 1.55;
            white-space: pre-wrap; word-break: break-word; user-select: text;
        }
        .chat-msg--user .chat-msg__body { color: #e8feff; }
        .chat-copy {
            position: absolute; top: 8px; right: 8px;
            background: transparent; border: 1px solid rgba(0, 251, 255, 0.2);
            color: rgba(0, 251, 255, 0.5); width: 26px; height: 26px;
            cursor: pointer; font-size: 10px; transition: 0.2s;
        }
        .chat-copy:hover { color: #00fbff; border-color: #00fbff; box-shadow: 0 0 10px rgba(0, 251, 255, 0.25); }
        .chat-copy.copied { color: #00ff88; border-color: #00ff88; }
        .chat-typing { color: rgba(0, 251, 255, 0.6); font-size: 11px; letter-spacing: 2px; animation: chat-pulse 1s infinite alternate; }

        @keyframes chat-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes chat-pulse { from { opacity: 0.45; } to { opacity: 1; } }

        .input-wrapper { pointer-events: auto; display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; flex-shrink: 0; }
        #user-input { background: rgba(0, 0, 0, 0.9); border: 1px solid rgba(0, 251, 255, 0.2); color: #00fbff; padding: 18px; width: 500px; font-family: 'Michroma'; outline: none; text-align: center; }
        .mic-btn { background: none; border: 1px solid #00fbff; color: #00fbff; width: 60px; height: 60px; border-radius: 50%; cursor: pointer; }
        .mic-btn.active { border-color: #ff0055; color: #ff0055; box-shadow: 0 0 30px #ff0055; }
        @keyframes alert-pulse { from { opacity: 0.4; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="system-alert"><div class="alert-text">TESrACT OVERRIDE</div></div>
    <div id="canvas-container"></div>
    <div id="hud">
        <div style="display:flex; justify-content: space-between;">
            <div class="ui-text" style="color:#00fbff; font-family:'Orbitron'; font-size:9px; letter-spacing:3px;">TESrACT: <span id="agent-status">STANDBY</span><br>CTRL: <span id="ctrl-mode">RESTRICTED</span></div>
            <div class="ui-text" id="clock" style="color:#00fbff; font-family:'Orbitron';">00:00:00</div>
        </div>
        <div id="title-container">
            <h1 id="title-main">TESrACT</h1>
            <div class="chat-panel">
                <div class="chat-panel__header">
                    <span>COMMS // UPLINK</span>
                    <span id="chat-count">1 MSG</span>
                </div>
                <div id="chat-messages" class="chat-messages"></div>
            </div>
        </div>
        <div class="input-wrapper"><input type="text" id="user-input" placeholder="COMMAND..." autocomplete="off"><button id="mic-btn" class="mic-btn"><i class="fa-solid fa-microphone"></i></button></div>
    </div>

    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }</script>
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        let isThinking = false, isListening = false, lerpFactor = 0, currentCtrl = false;
        const chatMessages = document.getElementById('chat-messages');
        const chatCountEl = document.getElementById('chat-count');
        const sysAlert = document.getElementById('system-alert');
        let loadingMsgEl = null;

        function updateChatCount() {
            const n = chatMessages.querySelectorAll('.chat-msg:not(.chat-msg--loading)').length;
            chatCountEl.textContent = `${n} MSG`;
        }

        function scrollChatToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function copyMessageText(text, btn) {
            try {
                await navigator.clipboard.writeText(text);
                btn.classList.add('copied');
                btn.innerHTML = '<i class="fa-solid fa-check"></i>';
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = '<i class="fa-solid fa-copy"></i>';
                }, 1600);
            } catch (_) {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            }
        }

        function appendChatMessage(role, text) {
            const msg = document.createElement('div');
            msg.className = `chat-msg chat-msg--${role}`;

            const label = document.createElement('div');
            label.className = 'chat-msg__label';
            label.textContent = role === 'user' ? 'OPERATOR' : 'TESrACT';

            const body = document.createElement('div');
            body.className = 'chat-msg__body';
            body.textContent = text;

            const copyBtn = document.createElement('button');
            copyBtn.className = 'chat-copy';
            copyBtn.type = 'button';
            copyBtn.title = 'Copy message';
            copyBtn.innerHTML = '<i class="fa-solid fa-copy"></i>';
            copyBtn.onclick = () => copyMessageText(text, copyBtn);

            msg.append(label, body, copyBtn);
            chatMessages.appendChild(msg);
            updateChatCount();
            scrollChatToBottom();
            return msg;
        }

        function showLoadingMessage() {
            removeLoadingMessage();
            loadingMsgEl = document.createElement('div');
            loadingMsgEl.className = 'chat-msg chat-msg--assistant chat-msg--loading';
            loadingMsgEl.innerHTML = '<div class="chat-msg__label">TESrACT</div><div class="chat-typing">PROCESSING UPLINK...</div>';
            chatMessages.appendChild(loadingMsgEl);
            scrollChatToBottom();
        }

        function removeLoadingMessage() {
            if (loadingMsgEl) {
                loadingMsgEl.remove();
                loadingMsgEl = null;
            }
        }

        appendChatMessage('assistant', 'AT YOUR SERVICE');

        async function processCommand(text) {
            const prompt = (text || '').trim();
            if (!prompt) return;

            appendChatMessage('user', prompt);
            isThinking = true;
            document.getElementById('agent-status').innerText = "PROCESSING";
            showLoadingMessage();

            try {
                const res = await fetch('/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({text: prompt}) });
                const data = await res.json();
                const reply = data.reply || 'No response received.';
                removeLoadingMessage();
                appendChatMessage('assistant', reply);

                try {
                    if (window.speechSynthesis && reply) {
                        window.speechSynthesis.cancel();
                        const utter = new SpeechSynthesisUtterance(reply);
                        utter.rate = 1.05;
                        utter.pitch = 1.0;
                        window.speechSynthesis.speak(utter);
                    }
                } catch(_) {}

                const replyLower = reply.toLowerCase();
                if (data.control_status && (replyLower.includes("execution") || replyLower.includes("opened") || replyLower.includes("complete"))) {
                    sysAlert.style.display = 'flex'; setTimeout(() => sysAlert.style.display = 'none', 2800);
                }
                if (data.control_status !== currentCtrl) {
                    currentCtrl = data.control_status;
                    document.getElementById('ctrl-mode').innerText = currentCtrl ? "ELEVATED" : "RESTRICTED";
                    document.getElementById('ctrl-mode').style.color = currentCtrl ? "#ff0000" : "#00fbff";
                }
            } catch(e) {
                removeLoadingMessage();
                appendChatMessage('assistant', 'TESrACT is having a temporary issue, Sir.');
                console.warn('Chat fetch failed', e);
            }
            isThinking = false;
            document.getElementById('agent-status').innerText = "STANDBY";
        }

        // --- HIGH PERFORMANCE THREE.JS ENGINE (Render-safe) ---
        const canvasContainer = document.getElementById('canvas-container');
        let renderer, composer, scene, camera;
        let instancedMeshes = [];
        const nodes = [];
        const COUNT = 140;
        const ICON_POOL = 70;
        const PARTICLE_SIZE = 2.2;
        const CAMERA_Z = 90;
        const CAM_NEAR = 20;
        const CAM_FAR = 300;
        const Z_WRAP = 50;
        const Z_RESET = -175;
        const TUNNEL_SPREAD = 150;
        const CIRCLE_Z = 32;
        const CIRCLE_R = 58;
        const _animPos = new THREE.Vector3();
        const _animTarget = new THREE.Vector3();
        const _animMat = new THREE.Matrix4();
        const _animScale = new THREE.Vector3();
        const _animQuat = new THREE.Quaternion();


        async function initThree() {
            try {
                const allBrands = await fetch('/icons/manifest.json').then((res) => {
                    if (!res.ok) throw new Error(`manifest ${res.status}`);
                    return res.json();
                });
                if (!allBrands.length) throw new Error('manifest empty');
                const brands = allBrands.slice(0, ICON_POOL);
                for (let i = brands.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [brands[i], brands[j]] = [brands[j], brands[i]];
                }
                scene = new THREE.Scene();
                scene.fog = new THREE.FogExp2(0x000000, 0.006);
                camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, CAM_NEAR, CAM_FAR);
                renderer = new THREE.WebGLRenderer({ 
                    antialias: false, 
                    powerPreference: "high-performance",
                    alpha: true 
                });
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1));
                renderer.setSize(window.innerWidth, window.innerHeight);
                canvasContainer.appendChild(renderer.domElement);

                composer = new EffectComposer(renderer);
                composer.addPass(new RenderPass(scene, camera));
                window.__bloomPass = new UnrealBloomPass(
                    new THREE.Vector2(window.innerWidth * 0.5, window.innerHeight * 0.5),
                    0.38, 0.42, 0.9
                );
                composer.addPass(window.__bloomPass);
                composer.addPass(new OutputPass());

                // Local icon textures — rasterize SVG to canvas (TextureLoader + SVG is unreliable in WebGL)
                const ICON_DIR = '/icons/';
                const ICON_SIZE = 64;
                const ICON_LOAD_CONCURRENCY = 12;

                function prepareSvg(svgText) {
                    let svg = svgText
                        .replace(/fill="currentColor"/gi, 'fill="#00fbff"')
                        .replace(/stroke="currentColor"/gi, 'stroke="#00fbff"')
                        .replace(/fill="#[0-9A-Fa-f]{3,8}"/gi, 'fill="#00fbff"');
                    if (!/fill="#00fbff"/i.test(svg.slice(0, 240))) {
                        svg = svg.replace('<svg ', '<svg fill="#00fbff" ');
                    }
                    return svg;
                }

                function canvasHasPixels(ctx, size) {
                    const data = ctx.getImageData(0, 0, size, size).data;
                    for (let i = 3; i < data.length; i += 16) {
                        if (data[i] > 12) return true;
                    }
                    return false;
                }

                function configureIconTexture(tex) {
                    tex.flipY = false;
                    tex.colorSpace = THREE.SRGBColorSpace;
                    tex.minFilter = THREE.LinearFilter;
                    tex.magFilter = THREE.LinearFilter;
                    tex.generateMipmaps = false;
                    return tex;
                }

                function loadSvgTexture(url) {
                    return fetch(url)
                        .then((res) => {
                            if (!res.ok) throw new Error(`${res.status} ${url}`);
                            return res.text();
                        })
                        .then((svgText) => new Promise((resolve, reject) => {
                            const img = new Image();
                            const blobUrl = URL.createObjectURL(
                                new Blob([prepareSvg(svgText)], { type: 'image/svg+xml' })
                            );
                            img.onload = () => {
                                const canvas = document.createElement('canvas');
                                canvas.width = ICON_SIZE;
                                canvas.height = ICON_SIZE;
                                const ctx = canvas.getContext('2d');
                                ctx.clearRect(0, 0, ICON_SIZE, ICON_SIZE);
                                ctx.drawImage(img, 0, 0, ICON_SIZE, ICON_SIZE);
                                URL.revokeObjectURL(blobUrl);
                                if (!canvasHasPixels(ctx, ICON_SIZE)) {
                                    reject(new Error(`empty raster: ${url}`));
                                    return;
                                }
                                resolve(configureIconTexture(new THREE.CanvasTexture(canvas)));
                            };
                            img.onerror = () => {
                                URL.revokeObjectURL(blobUrl);
                                reject(new Error(`SVG rasterize failed: ${url}`));
                            };
                            img.src = blobUrl;
                        }));
                }

                const geometry = new THREE.PlaneGeometry(PARTICLE_SIZE, PARTICLE_SIZE);
                const perMeshCount = Math.ceil(COUNT / brands.length);

                instancedMeshes = brands.map((brand) => {
                    const mat = new THREE.MeshBasicMaterial({
                        color: 0x00fbff,
                        transparent: true,
                        opacity: 0.42,
                        side: THREE.DoubleSide,
                        depthWrite: false
                    });

                    const im = new THREE.InstancedMesh(geometry, mat, perMeshCount);
                    im.frustumCulled = false;
                    scene.add(im);
                    return im;
                });

                // Stagger texture rasterization so 1000 icons don't freeze the tab
                let loadCursor = 0, loadActive = 0;
                function pumpIconLoads() {
                    while (loadActive < ICON_LOAD_CONCURRENCY && loadCursor < brands.length) {
                        const brand = brands[loadCursor++];
                        const im = instancedMeshes[loadCursor - 1];
                        loadActive++;
                        loadSvgTexture(`${ICON_DIR}${brand}.svg`)
                            .then((tex) => {
                                im.material.map = tex;
                                im.material.needsUpdate = true;
                            })
                            .catch((err) => console.warn(`Icon fallback for ${brand}:`, err.message))
                            .finally(() => { loadActive--; pumpIconLoads(); });
                    }
                }
                pumpIconLoads();

                const activeMeshes = Math.min(instancedMeshes.length, COUNT);
                const activePerMesh = Math.ceil(COUNT / activeMeshes);
                instancedMeshes.forEach((im, idx) => { im.count = idx < activeMeshes ? activePerMesh : 0; });

                for (let i = 0; i < COUNT; i++) {
                    nodes.push({
                        tunnelX: (Math.random() - 0.5) * TUNNEL_SPREAD,
                        tunnelY: (Math.random() - 0.5) * TUNNEL_SPREAD,
                        tunnelZ: Z_RESET + Math.random() * (Z_WRAP - Z_RESET),
                        circleAngle: (i / COUNT) * Math.PI * 2 * 3,
                        speed: 0.5 + Math.random() * 1.1,
                        scale: 0.75 + Math.random() * 0.45,
                        meshIndex: i % activeMeshes,
                        instanceIndex: Math.floor(i / activeMeshes)
                    });
                }
                camera.position.z = CAMERA_Z;

                // Handle window resize (critical for deployment)
                function onResize() {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                    if (composer && window.__bloomPass) {
                        window.__bloomPass.resolution.set(window.innerWidth * 0.5, window.innerHeight * 0.5);
                    }
                }
                window.addEventListener('resize', onResize, false);

                return true;
            } catch (err) {
                console.error('Three.js init failed:', err);
                canvasContainer.innerHTML = '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#f55;font-family:monospace;font-size:12px;opacity:0.6;">WEBGL_UNAVAILABLE ΓÇö HUD DEGRADED</div>';
                return false;
            }
        }

        let threeReady = false;
        initThree().then((ok) => { threeReady = ok; });

        function animate() {
            requestAnimationFrame(animate);
            if (!threeReady || !renderer || !composer || !instancedMeshes.length) return;

            lerpFactor = THREE.MathUtils.lerp(lerpFactor, isListening ? 1 : 0, 0.08);

            const r = CIRCLE_R + Math.sin(Date.now() * 0.0015) * 5;
            nodes.forEach(n => {
                n.tunnelZ += n.speed * (isThinking ? 4 : 1);
                if (n.tunnelZ > Z_WRAP) n.tunnelZ = Z_RESET;

                _animPos.set(n.tunnelX, n.tunnelY, n.tunnelZ);
                _animTarget.set(Math.cos(n.circleAngle) * r, Math.sin(n.circleAngle) * r, CIRCLE_Z);
                _animPos.lerp(_animTarget, lerpFactor);

                const im = instancedMeshes[n.meshIndex];
                if (!im || n.instanceIndex >= im.count) return;
                _animScale.set(n.scale, n.scale, n.scale);
                _animMat.compose(_animPos, _animQuat, _animScale);
                im.setMatrixAt(n.instanceIndex, _animMat);
            });

            instancedMeshes.forEach(im => { im.instanceMatrix.needsUpdate = true; });
            composer.render();
        }
        animate();

        // Dedicated reliable clock updater (independent of Three.js loop)
        function updateClock() {
            const clockEl = document.getElementById('clock');
            if (clockEl) {
                const now = new Date();
                clockEl.innerText = now.toLocaleTimeString([], { 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit' 
                });
            }
        }
        updateClock();
        setInterval(updateClock, 1000);

        document.getElementById('user-input').onkeypress = (e) => { if(e.key === 'Enter') { processCommand(e.target.value); e.target.value = ''; } };
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Speech) {
            const rec = new Speech(), micBtn = document.getElementById('mic-btn');
            micBtn.onclick = () => { isListening = true; rec.start(); micBtn.classList.add('active'); };
            rec.onresult = (e) => processCommand(e.results[0][0].transcript);
            rec.onend = () => { isListening = false; micBtn.classList.remove('active'); };
        }
    </script>
</body>
</html>
